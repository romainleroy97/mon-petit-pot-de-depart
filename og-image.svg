<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F1147"/>
      <stop offset="100%" stop-color="#2D1B6B"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5A36"/>
      <stop offset="100%" stop-color="#FF3D8A"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Confettis décoratifs -->
  <rect x="80" y="60" width="28" height="28" rx="6" fill="#FFC93C" opacity="0.9" transform="rotate(-15 94 74)"/>
  <circle cx="160" cy="160" r="18" fill="#00B88A" opacity="0.8"/>
  <rect x="1060" y="80" width="22" height="22" rx="5" fill="#FF3D8A" opacity="0.9" transform="rotate(20 1071 91)"/>
  <circle cx="1100" cy="200" r="14" fill="#FFC93C" opacity="0.7"/>
  <rect x="60" y="480" width="24" height="24" rx="5" fill="#FF5A36" opacity="0.8" transform="rotate(10 72 492)"/>
  <circle cx="140" cy="560" r="16" fill="#FF3D8A" opacity="0.7"/>
  <rect x="1080" y="500" width="26" height="26" rx="6" fill="#00B88A" opacity="0.8" transform="rotate(-12 1093 513)"/>
  <circle cx="1120" cy="420" r="12" fill="#FFF4E3" opacity="0.5"/>
  <rect x="300" y="40" width="16" height="16" rx="4" fill="#FFF4E3" opacity="0.4" transform="rotate(25 308 48)"/>
  <circle cx="900" cy="580" r="20" fill="#FFC93C" opacity="0.6"/>
  <rect x="950" y="30" width="18" height="18" rx="4" fill="#FF5A36" opacity="0.7" transform="rotate(-20 959 39)"/>
  <circle cx="50" cy="320" r="10" fill="#FFC93C" opacity="0.5"/>
  <circle cx="1150" cy="320" r="10" fill="#00B88A" opacity="0.5"/>

  <!-- Carte centrale -->
  <rect x="180" y="100" width="840" height="430" rx="24" fill="url(#card)"/>
  <rect x="188" y="108" width="824" height="414" rx="20" fill="none" stroke="#1F1147" stroke-width="3" opacity="0.2"/>

  <!-- Pin -->
  <circle cx="600" cy="96" r="14" fill="#FFC93C" stroke="#1F1147" stroke-width="3"/>

  <!-- Confettis sur la carte -->
  <text x="220" y="165" font-size="32" opacity="0.4">🎉</text>
  <text x="930" y="500" font-size="28" opacity="0.4">🥂</text>

  <!-- Texte eyebrow -->
  <text x="600" y="185" font-family="Georgia, serif" font-size="22" fill="#FFF4E3" text-anchor="middle" opacity="0.9" letter-spacing="3">C'EST MON POT DE DÉPART !</text>

  <!-- Titre principal -->
  <text x="600" y="275" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#FFF4E3" text-anchor="middle">Bien partir,</text>
  <text x="600" y="350" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#1F1147" text-anchor="middle">
    <tspan>ça se prépare.</tspan>
  </text>
  <!-- Fond highlight sur "ça se prépare" -->
  <rect x="290" y="298" width="620" height="70" rx="10" fill="#FFF4E3" opacity="0.25"/>
  <text x="600" y="350" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#1F1147" text-anchor="middle">ça se prépare.</text>

  <!-- Séparateur -->
  <line x1="440" y1="385" x2="760" y2="385" stroke="#FFF4E3" stroke-width="2" opacity="0.5"/>

  <!-- Tagline -->
  <text x="600" y="425" font-family="Georgia, serif" font-size="22" fill="#FFF4E3" text-anchor="middle" opacity="0.9">monpetitpotdedepart.fr</text>

  <!-- Badge CTA -->
  <rect x="460" y="448" width="280" height="52" rx="26" fill="#1F1147" stroke="#FFF4E3" stroke-width="2"/>
  <text x="600" y="480" font-family="Georgia, serif" font-size="18" fill="#FFF4E3" text-anchor="middle" font-weight="bold">✨ Passe faire coucou</text>

</svg>
